# Alembic configuration for the auth database (the only app-owned schema;
# the main MariaDB database is reflected, never migrated from here).
#
# The database URL is resolved in migrations/env.py from AUTH_DATABASE_URI /
# DATABASE_URL (falling back to the local dev SQLite file), so no URL is
# configured in this file.

[alembic]
script_location = %(here)s/migrations

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
