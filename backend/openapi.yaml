servers:
- url: https://api.pandects.org
  description: Production API
- url: http://localhost:5113
  description: Local development API
paths:
  /v1/sections:
    get:
      parameters:
      - in: query
        name: year
        description: Agreement year filter. Repeat query key for multiple values.
        schema:
          type: array
          default: []
          example:
          - 2022
          - 2023
          items:
            type: integer
        required: false
        explode: true
        style: form
      - in: query
        name: target
        description: Exact target company names to include.
        schema:
          type: array
          default: []
          example:
          - Slack Technologies, Inc.
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: acquirer
        description: Exact acquirer company names to include.
        schema:
          type: array
          default: []
          example:
          - salesforce.com, inc.
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: standard_id
        description: Clause type taxonomy standard IDs (Clause Type in the Search
          UI). Parent IDs expand to include descendant taxonomy nodes.
        schema:
          type: array
          default: []
          example:
          - '1.1'
          - 1.2.3
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transaction_price_total
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transaction_price_stock
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transaction_price_cash
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transaction_price_assets
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transaction_consideration
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: target_type
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: acquirer_type
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: target_counsel
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: acquirer_counsel
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: target_industry
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: acquirer_industry
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: deal_status
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: attitude
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: deal_type
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: purpose
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: target_pe
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: acquirer_pe
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: metadata
        description: Additional agreement metadata fields to include in each result
          under `results[].metadata`. Repeat query key for multiple values.
        schema:
          type: array
          default: []
          example:
          - deal_type
          - target_industry
          items:
            type: string
            enum:
            - filing_date
            - prob_filing
            - filing_company_name
            - filing_company_cik
            - form_type
            - exhibit_type
            - transaction_price_total
            - transaction_price_stock
            - transaction_price_cash
            - transaction_price_assets
            - transaction_consideration
            - target_type
            - acquirer_type
            - target_industry
            - acquirer_industry
            - announce_date
            - close_date
            - deal_status
            - attitude
            - deal_type
            - purpose
            - target_pe
            - acquirer_pe
            - url
        required: false
        explode: true
        style: form
      - in: query
        name: agreement_uuid
        description: Filter to one agreement UUID.
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: section_uuid
        description: Filter to one section UUID.
        schema:
          type: string
          default: null
          example: 5e59453aaa9255c4
          nullable: true
        required: false
      - in: query
        name: sort_by
        description: 'Sort key. One of: `year`, `target`, `acquirer`.'
        schema:
          type: string
          default: year
          enum:
          - year
          - target
          - acquirer
        required: false
      - in: query
        name: sort_direction
        description: 'Sort direction. One of: `asc`, `desc`.'
        schema:
          type: string
          default: desc
          enum:
          - asc
          - desc
        required: false
      - in: query
        name: page
        description: 1-based page number.
        schema:
          type: integer
          default: 1
          example: 1
        required: false
      - in: query
        name: page_size
        description: Page size. Effective max is 10 for unauthenticated callers and
          100 for authenticated callers.
        schema:
          type: integer
          default: 25
          example: 25
        required: false
      responses:
        '422':
          $ref: '#/components/responses/UNPROCESSABLE_ENTITY'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SectionsResponse'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
      - sections
      operationId: listSections
      summary: List agreement sections
      description: Searches sections using structured filters and taxonomy IDs. For
        list filters, repeat query keys (for example `year=2023&year=2024`).
  /v1/agreements:
    get:
      parameters:
      - in: query
        name: cursor
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: page_size
        schema:
          type: integer
          default: 25
        required: false
      - in: query
        name: include_xml
        schema:
          type: boolean
          default: false
        required: false
      - in: query
        name: year
        schema:
          type: array
          default: []
          items:
            type: integer
        required: false
        explode: true
        style: form
      - in: query
        name: target
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: acquirer
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
