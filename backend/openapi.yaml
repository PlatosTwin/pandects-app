servers:
- url: https://api.pandects.org
  description: Production API
- url: http://localhost:5113
  description: Local development API
paths:
  /v1/sections:
    get:
      parameters:
      - in: query
        name: year
        description: Agreement year filter. Repeat query key for multiple values.
        schema:
          type: array
          default: []
          example:
          - 2022
          - 2023
          items:
            type: integer
        required: false
        explode: true
        style: form
      - in: query
        name: target
        description: Exact target company names to include.
        schema:
          type: array
          default: []
          example:
          - Slack Technologies, Inc.
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: acquirer
        description: Exact acquirer company names to include.
        schema:
          type: array
          default: []
          example:
          - salesforce.com, inc.
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: standard_id
        description: Clause type taxonomy standard IDs (Clause Type in the Search
          UI). Parent IDs expand to include descendant taxonomy nodes.
        schema:
          type: array
          default: []
          example:
          - '1.1'
          - 1.2.3
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transaction_price_total
        description: Transaction value buckets for total consideration, using the
          Search UI labels (for example `100M - 250M`).
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transaction_price_stock
        description: Transaction value buckets for the stock portion of consideration,
          using the Search UI labels (for example `100M - 250M`).
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transaction_price_cash
        description: Transaction value buckets for the cash portion of consideration,
          using the Search UI labels (for example `100M - 250M`).
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transaction_price_assets
        description: Transaction value buckets for the asset portion of consideration,
          using the Search UI labels (for example `100M - 250M`).
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transaction_consideration
        description: Transaction consideration category values from the agreement
          record.
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: target_type
        description: Target company type values (for example `public` or `private`).
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: acquirer_type
        description: Acquirer company type values (for example `public` or `private`).
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: target_industry
        description: Target industry values from normalized agreement metadata.
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: acquirer_industry
        description: Acquirer industry values from normalized agreement metadata.
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: deal_status
        description: Deal status values (for example `pending`, `complete`, `cancelled`).
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: attitude
        description: Deal attitude values (for example `friendly`, `hostile`, `unsolicited`).
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: deal_type
        description: Deal type values from agreement metadata.
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: purpose
        description: Strategic purpose values from agreement metadata.
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: target_pe
        description: 'Target private-equity backed filter. Supported values: `true`,
          `false`.'
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: acquirer_pe
        description: 'Acquirer private-equity backed filter. Supported values: `true`,
          `false`.'
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: metadata
        description: Additional agreement metadata fields to include in each result
          under `results[].metadata`. Repeat query key for multiple values.
        schema:
          type: array
          default: []
          example:
          - deal_type
          - target_industry
          items:
            type: string
            enum:
            - filing_date
            - prob_filing
            - filing_company_name
            - filing_company_cik
            - form_type
            - exhibit_type
            - transaction_price_total
            - transaction_price_stock
            - transaction_price_cash
            - transaction_price_assets
            - transaction_consideration
            - target_type
            - acquirer_type
            - target_industry
            - acquirer_industry
            - announce_date
            - close_date
            - deal_status
            - attitude
            - deal_type
            - purpose
            - target_pe
            - acquirer_pe
            - url
        required: false
        explode: true
        style: form
      - in: query
        name: agreement_uuid
        description: Filter to one agreement UUID.
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: section_uuid
        description: Filter to one section UUID.
        schema:
          type: string
          default: null
          example: 5e59453aaa9255c4
          nullable: true
        required: false
      - in: query
        name: sort_by
        description: 'Sort key. One of: `year`, `target`, `acquirer`.'
        schema:
          type: string
          default: year
          enum:
          - year
          - target
          - acquirer
        required: false
      - in: query
        name: sort_direction
        description: 'Sort direction. One of: `asc`, `desc`.'
        schema:
          type: string
          default: desc
          enum:
          - asc
          - desc
        required: false
      - in: query
        name: page
        description: 1-based page number.
        schema:
          type: integer
          default: 1
          example: 1
        required: false
      - in: query
        name: page_size
        description: Page size. Effective max is 10 for unauthenticated callers and
          100 for authenticated callers.
        schema:
          type: integer
          default: 25
          example: 25
        required: false
      responses:
        '422':
          $ref: '#/components/responses/UNPROCESSABLE_ENTITY'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SectionsResponse'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
      - sections
      operationId: listSections
      summary: List agreement sections
      description: Searches sections using structured filters and taxonomy IDs. For
        list filters, repeat query keys (for example `year=2023&year=2024`).
  /v1/agreements:
    get:
      parameters:
      - in: query
        name: cursor
        description: Opaque base64 cursor from `next_cursor` for keyset pagination.
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: page_size
        description: Batch size for this page. Maximum is 100.
        schema:
          type: integer
          default: 25
          example: 25
        required: false
      - in: query
        name: include_xml
        description: Include full agreement XML in each item. Requires authentication.
        schema:
          type: boolean
          default: false
        required: false
      - in: query
        name: year
        schema:
          type: array
          default: []
          items:
            type: integer
        required: false
        explode: true
        style: form
      - in: query
        name: target
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: acquirer
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transaction_price_total
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transaction_price_stock
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transaction_price_cash
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transaction_price_assets
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transaction_consideration
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: target_type
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: acquirer_type
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: target_industry
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: acquirer_industry
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: deal_status
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: attitude
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: deal_type
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: purpose
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: target_pe
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: acquirer_pe
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: agreement_uuid
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: section_uuid
        schema:
          type: string
          default: null
          nullable: true
        required: false
      responses:
        '422':
          $ref: '#/components/responses/UNPROCESSABLE_ENTITY'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgreementsListResponse'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
      - agreements
      operationId: listAgreements
      summary: List agreements with keyset pagination
      description: Lists eligible agreements using a base64 cursor. Supports the same
        agreement-level filters as `/v1/sections` except clause-type taxonomy filtering.
  /v1/agreements/{agreement_uuid}:
    get:
      parameters:
      - in: path
        name: agreement_uuid
        required: true
        schema:
          type: string
          minLength: 1
        description: Agreement UUID.
        example: 0279944d-85ca-5707-908a-d4cbd169d058
      responses:
        '422':
          $ref: '#/components/responses/UNPROCESSABLE_ENTITY'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgreementResponse'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
      - agreements
      operationId: getAgreement
      summary: Retrieve agreement text by UUID
      description: Returns agreement metadata and XML content. For anonymous callers,
        XML can be redacted based on `focus_section_uuid` and `neighbor_sections`.
    parameters:
    - in: path
      name: agreement_uuid
      required: true
      schema:
        type: string
        minLength: 1
  /v1/sections/{section_uuid}:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SectionResponse'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
      - sections
      operationId: getSection
      summary: Retrieve section text by UUID
      description: Returns one section payload including taxonomy IDs and XML content.
      parameters:
      - in: path
        name: section_uuid
        required: true
        schema:
          type: string
          minLength: 1
        description: Section UUID.
        example: 5e59453aaa9255c4
    parameters:
    - in: path
      name: section_uuid
      required: true
      schema:
        type: string
        minLength: 1
  /v1/taxonomy:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  required:
                  - id
                  properties:
                    id:
                      type: string
                    children:
                      type: object
                      additionalProperties:
                        type: object
      tags:
      - taxonomy
      operationId: getTaxonomy
      summary: Retrieve clause taxonomy
      description: Returns the hierarchical Pandects taxonomy tree keyed by standard
        ID.
  /v1/naics:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NaicsResponse'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
      - naics
      operationId: getNaics
      summary: Retrieve NAICS sectors and subsectors
      description: Returns NAICS sectors with nested subsectors.
  /v1/dumps:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DumpEntry'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
      - dumps
      operationId: listDumps
      summary: List available bulk dumps
      description: Returns newest-first metadata for publicly available database dump
        artifacts.
info:
  title: Pandects API
  version: v1
tags:
- name: agreements
  description: Retrieve full text for a given agreement
- name: sections
  description: List and retrieve merger agreement sections
- name: taxonomy
  description: Access the Pandects agreement taxonomy
- name: naics
  description: Access the NAICS sector and subsector taxonomy
- name: dumps
  description: Access metadata about bulk data on Cloudflare
openapi: 3.0.2
components:
  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
          description: Error code
        status:
          type: string
          description: Error name
        message:
          type: string
          description: Error message
        errors:
          type: object
          description: Errors
          additionalProperties: {}
    PaginationMetadata:
      type: object
      properties:
        total:
          type: integer
        total_pages:
          type: integer
        first_page:
          type: integer
        last_page:
          type: integer
        page:
          type: integer
        previous_page:
          type: integer
        next_page:
          type: integer
    SectionsResultMetadata:
      type: object
      properties:
        filing_date:
          type: string
          description: SEC filing date, when available.
          nullable: true
        prob_filing:
          type: number
          description: Model confidence score for filing linkage.
          nullable: true
        filing_company_name:
          type: string
          description: Filing entity name in SEC metadata.
          nullable: true
        filing_company_cik:
          type: string
          description: Filing entity CIK in SEC metadata.
          nullable: true
        form_type:
          type: string
          description: SEC form type.
          nullable: true
        exhibit_type:
          type: string
          description: SEC exhibit type.
          nullable: true
        transaction_price_total:
          type: number
          description: Total transaction value when available.
          nullable: true
        transaction_price_stock:
          type: number
          description: Stock portion of transaction consideration.
          nullable: true
        transaction_price_cash:
          type: number
          description: Cash portion of transaction consideration.
          nullable: true
        transaction_price_assets:
          type: number
          description: Asset portion of transaction consideration.
          nullable: true
        transaction_consideration:
          type: string
          description: High-level consideration type classification.
          nullable: true
        target_type:
          type: string
          description: Target company type.
          nullable: true
        acquirer_type:
          type: string
          description: Acquirer company type.
          nullable: true
        target_industry:
          type: string
          description: Target industry classification.
          nullable: true
        acquirer_industry:
          type: string
          description: Acquirer industry classification.
          nullable: true
        announce_date:
          type: string
          description: Public deal announcement date.
          nullable: true
        close_date:
          type: string
          description: Deal close date, when available.
          nullable: true
        deal_status:
          type: string
          description: Current status of the deal.
          nullable: true
        attitude:
          type: string
          description: Deal attitude classification.
          nullable: true
        deal_type:
          type: string
          description: Deal type classification.
          nullable: true
        purpose:
          type: string
          description: Deal purpose classification.
          nullable: true
        target_pe:
          type: boolean
          description: Whether target is private-equity backed.
          nullable: true
        acquirer_pe:
          type: boolean
          description: Whether acquirer is private-equity backed.
          nullable: true
        url:
          type: string
          description: Source filing URL.
          nullable: true
    SectionItem:
      type: object
      properties:
        id:
          type: string
          description: Canonical identifier for this section result.
        agreement_uuid:
          type: string
          description: Agreement UUID for the section.
        section_uuid:
          type: string
          description: Section UUID.
        standard_id:
          type: array
          description: Matched taxonomy standard IDs for this section.
          items:
            type: string
        xml:
          type: string
          description: Section XML content. Full content requires authentication.
        article_title:
          type: string
          description: Article heading that contains the section.
        section_title:
          type: string
          description: Section heading text.
        acquirer:
          type: string
          description: Acquirer company name.
        target:
          type: string
          description: Target company name.
        year:
          type: integer
          description: Agreement year.
        verified:
          type: boolean
          description: Whether this result is from verified content.
        metadata:
          description: Requested agreement metadata fields for this result. Included
            only when the `metadata` query parameter is provided.
          anyOf:
          - $ref: '#/components/schemas/SectionsResultMetadata'
          - type: object
            nullable: true
    AccessInfo:
      type: object
      properties:
        tier:
          type: string
          description: Access tier used to shape response limits and content visibility.
        message:
          type: string
          description: Optional human-readable access message for the caller.
          nullable: true
      required:
      - tier
    SectionsResponse:
      type: object
      properties:
        results:
          type: array
          description: Page of section results.
          items:
            $ref: '#/components/schemas/SectionItem'
        access:
          description: Access context applied to this response.
          allOf:
          - $ref: '#/components/schemas/AccessInfo'
        page:
          type: integer
          description: Current 1-based page number.
        page_size:
          type: integer
          description: Effective page size for this response.
        total_count:
          type: integer
          description: Total number of matching sections.
        total_pages:
          type: integer
          description: Total pages at the effective page size.
        has_next:
          type: boolean
          description: Whether a next page exists.
        has_prev:
          type: boolean
          description: Whether a previous page exists.
        next_num:
          type: integer
          description: Next page number when `has_next` is true.
          nullable: true
        prev_num:
          type: integer
          description: Previous page number when `has_prev` is true.
          nullable: true
    AgreementListItem:
      type: object
      properties:
        agreement_uuid:
          type: string
          description: Agreement UUID.
        year:
          type: integer
          description: Agreement year.
          nullable: true
        target:
          type: string
          description: Target company name.
          nullable: true
        acquirer:
          type: string
          description: Acquirer company name.
          nullable: true
        filing_date:
          type: string
          description: SEC filing date, when available.
          nullable: true
        prob_filing:
          type: number
          description: Model confidence score for filing linkage.
          nullable: true
        filing_company_name:
          type: string
          description: Filing entity name in SEC metadata.
          nullable: true
        filing_company_cik:
          type: string
          description: Filing entity CIK in SEC metadata.
          nullable: true
        form_type:
          type: string
          description: SEC form type.
          nullable: true
        exhibit_type:
          type: string
          description: SEC exhibit type.
          nullable: true
        transaction_price_total:
          type: number
          description: Total transaction value when available.
          nullable: true
        transaction_price_stock:
          type: number
          description: Stock portion of transaction consideration.
          nullable: true
        transaction_price_cash:
          type: number
          description: Cash portion of transaction consideration.
          nullable: true
        transaction_price_assets:
          type: number
          description: Asset portion of transaction consideration.
          nullable: true
        transaction_consideration:
          type: string
          description: High-level consideration type classification.
          nullable: true
        target_type:
          type: string
          description: Target company type.
          nullable: true
        acquirer_type:
          type: string
          description: Acquirer company type.
          nullable: true
        target_industry:
          type: string
          description: Target industry classification.
          nullable: true
        acquirer_industry:
          type: string
          description: Acquirer industry classification.
          nullable: true
        announce_date:
          type: string
          description: Public deal announcement date.
          nullable: true
        close_date:
          type: string
          description: Deal close date, when available.
          nullable: true
        deal_status:
          type: string
          description: Current status of the deal.
          nullable: true
        attitude:
          type: string
          description: Deal attitude classification.
          nullable: true
        deal_type:
          type: string
          description: Deal type classification.
          nullable: true
        purpose:
          type: string
          description: Deal purpose classification.
          nullable: true
        target_pe:
          type: boolean
          description: Whether target is private-equity backed.
          nullable: true
        acquirer_pe:
          type: boolean
          description: Whether acquirer is private-equity backed.
          nullable: true
        url:
          type: string
          description: Source filing URL.
          nullable: true
        xml:
          type: string
          description: Agreement XML content. Included only when `include_xml=true`.
          nullable: true
    AgreementsListResponse:
      type: object
      properties:
        results:
          type: array
          description: Page of agreements.
          items:
            $ref: '#/components/schemas/AgreementListItem'
        access:
          description: Access context applied to this response.
          allOf:
          - $ref: '#/components/schemas/AccessInfo'
        page_size:
          type: integer
