      responses:
        '422':
          $ref: '#/components/responses/UNPROCESSABLE_ENTITY'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgreementsListResponse'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
      - agreements
      operationId: listAgreements
      summary: List agreements with keyset pagination
      description: Lists eligible agreements using a base64 cursor. Supports the same
        agreement-level filters as `/v1/sections` except clause-type taxonomy filtering.
  /v1/agreements/{agreement_uuid}:
    get:
      parameters:
      - in: query
        name: focus_section_uuid
        description: Optional section UUID used when redacting anonymous responses
          to keep a focused neighborhood visible.
        schema:
          type: string
          example: 5e59453aaa9255c4
          nullable: true
        required: false
      - in: query
        name: neighbor_sections
        description: Number of neighboring sections to include around `focus_section_uuid`
          when response XML is redacted.
        schema:
          type: integer
          default: 1
          example: 1
        required: false
      responses:
        '422':
          $ref: '#/components/responses/UNPROCESSABLE_ENTITY'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgreementResponse'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
      - agreements
      operationId: getAgreement
      summary: Retrieve agreement text by UUID
      description: Returns agreement metadata and XML content. For anonymous callers,
        XML can be redacted based on `focus_section_uuid` and `neighbor_sections`.
    parameters:
    - in: path
      name: agreement_uuid
      required: true
      schema:
        type: string
        minLength: 1
  /v1/agreements/{agreement_uuid}/tax-clauses:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxClauseListResponse'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
      - agreements
      operationId: getAgreementTaxClauses
      summary: Retrieve tax clauses for an agreement
      description: Returns extracted tax-module clauses for the latest verified XML
        of an agreement.
    parameters:
    - in: path
      name: agreement_uuid
      required: true
      schema:
        type: string
        minLength: 1
  /v1/sections/{section_uuid}:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SectionResponse'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
      - sections
      operationId: getSection
      summary: Retrieve section text by UUID
      description: Returns one section payload including taxonomy IDs and XML content.
    parameters:
    - in: path
      name: section_uuid
      required: true
      schema:
        type: string
        minLength: 1
  /v1/sections/{section_uuid}/tax-clauses:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxClauseListResponse'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
      - sections
      operationId: getSectionTaxClauses
      summary: Retrieve tax clauses for a section
      description: Returns extracted tax-module clauses for a specific latest section.
    parameters:
    - in: path
      name: section_uuid
      required: true
      schema:
        type: string
        minLength: 1
  /v1/taxonomy:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  required:
                  - id
                  properties:
                    id:
                      type: string
                    children:
                      type: object
                      additionalProperties:
                        type: object
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
      - taxonomy
      operationId: getTaxonomy
      summary: Retrieve clause taxonomy
      description: Returns the hierarchical Pandects taxonomy tree keyed by standard
        ID.
  /v1/taxonomy/tax-clauses:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  required:
                  - id
                  properties:
                    id:
                      type: string
                    children:
                      type: object
                      additionalProperties:
                        type: object
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
      - tax-clause-taxonomy
      operationId: getTaxClauseTaxonomy
      summary: Retrieve tax-clause taxonomy
      description: Returns the hierarchical Pandects tax-clause taxonomy tree.
  /v1/naics:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NaicsResponse'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
      - naics
      operationId: getNaics
      summary: Retrieve NAICS sectors and subsectors
      description: Returns NAICS sectors with nested subsectors.
  /v1/counsel:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CounselResponse'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
      - counsel
      operationId: getCounsel
      summary: Retrieve canonical counsel names
      description: Returns canonical counsel IDs and names for counsel entities referenced
        across agreements.
  /v1/dumps:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DumpEntry'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
      - dumps
      operationId: listDumps
      summary: List available bulk dumps
      description: Returns newest-first metadata for publicly available database dump
        artifacts.
info:
  title: Pandects API
  version: v1
tags:
- name: sections_list
  description: List merger agreement sections
- name: agreements
  description: Retrieve full text for a given agreement
- name: sections
  description: Retrieve full text for a given section
- name: taxonomy
  description: Access the Pandects agreement taxonomy
- name: tax-clause-taxonomy
  description: Access the Pandects tax-clause taxonomy
- name: naics
  description: Access the NAICS sector and subsector taxonomy
- name: counsel
  description: Access canonical counsel names
- name: dumps
  description: Access metadata about bulk data on Cloudflare
openapi: 3.0.2
components:
  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
          description: Error code
        status:
          type: string
          description: Error name
        message:
          type: string
          description: Error message
        errors:
          type: object
          description: Errors
          additionalProperties: {}
    PaginationMetadata:
      type: object
      properties:
        total:
          type: integer
        total_pages:
          type: integer
        first_page:
          type: integer
        last_page:
          type: integer
        page:
          type: integer
        previous_page:
          type: integer
        next_page:
          type: integer
    SectionsResultMetadata:
      type: object
      properties:
        filing_date:
          type: string
          nullable: true
        prob_filing:
          type: number
          nullable: true
        filing_company_name:
          type: string
          nullable: true
        filing_company_cik:
          type: string
          nullable: true
        form_type:
          type: string
          nullable: true
        exhibit_type:
          type: string
          nullable: true
        transaction_price_total:
          type: number
          nullable: true
        transaction_price_stock:
          type: number
          nullable: true
        transaction_price_cash:
          type: number
          nullable: true
        transaction_price_assets:
          type: number
          nullable: true
        transaction_consideration:
          type: string
          nullable: true
        target_type:
          type: string
          nullable: true
        acquirer_type:
          type: string
          nullable: true
        target_industry:
          type: string
          nullable: true
        acquirer_industry:
          type: string
          nullable: true
        announce_date:
          type: string
          nullable: true
        close_date:
          type: string
          nullable: true
        deal_status:
          type: string
          nullable: true
        attitude:
          type: string
          nullable: true
        deal_type:
          type: string
          nullable: true
        purpose:
          type: string
          nullable: true
        target_pe:
          type: boolean
          nullable: true
        acquirer_pe:
          type: boolean
          nullable: true
        url:
          type: string
          nullable: true
    SectionItem:
      type: object
      properties:
        id:
          type: string
        agreement_uuid:
          type: string
        section_uuid:
          type: string
        standard_id:
          type: array
          items:
            type: string
        xml:
          type: string
        article_title:
          type: string
        section_title:
          type: string
        acquirer:
          type: string
        target:
          type: string
        year:
          type: integer
        verified:
          type: boolean
        metadata:
          anyOf:
          - type: object
            nullable: true
          - $ref: '#/components/schemas/SectionsResultMetadata'
    AccessInfo:
      type: object
      properties:
        tier:
          type: string
        message:
          type: string
          nullable: true
      required:
      - tier
    SectionsResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/SectionItem'
        access:
          $ref: '#/components/schemas/AccessInfo'
        page:
          type: integer
        page_size:
          type: integer
        total_count:
          type: integer
        total_count_is_approximate:
          type: boolean
        total_pages:
          type: integer
        has_next:
          type: boolean
        has_prev:
          type: boolean
        next_num:
          type: integer
          nullable: true
        prev_num:
          type: integer
          nullable: true
    AgreementListItem:
      type: object
      properties:
        agreement_uuid:
          type: string
        year:
          type: integer
          nullable: true
        target:
          type: string
          nullable: true
        acquirer:
          type: string
          nullable: true
        filing_date:
          type: string
          nullable: true
        prob_filing:
          type: number
          nullable: true
        filing_company_name:
          type: string
          nullable: true
        filing_company_cik:
          type: string
          nullable: true
        form_type:
          type: string
          nullable: true
        exhibit_type:
          type: string
          nullable: true
        transaction_price_total:
          type: number
          nullable: true
        transaction_price_stock:
          type: number
          nullable: true
        transaction_price_cash:
          type: number
          nullable: true
        transaction_price_assets:
          type: number
          nullable: true
        transaction_consideration:
          type: string
          nullable: true
        target_type:
          type: string
          nullable: true
        acquirer_type:
          type: string
          nullable: true
        target_industry:
          type: string
          nullable: true
        acquirer_industry:
          type: string
          nullable: true
        announce_date:
          type: string
          nullable: true
        close_date:
          type: string
          nullable: true
        deal_status:
          type: string
          nullable: true
        attitude:
          type: string
          nullable: true
        deal_type:
          type: string
          nullable: true
        purpose:
          type: string
          nullable: true
        target_pe:
          type: boolean
          nullable: true
        acquirer_pe:
          type: boolean
          nullable: true
        url:
          type: string
          nullable: true
        xml:
          type: string
          nullable: true
    AgreementsListResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/AgreementListItem'
        access:
          $ref: '#/components/schemas/AccessInfo'
        page_size:
          type: integer
        returned_count:
          type: integer
        has_next:
          type: boolean
        next_cursor:
          type: string
          nullable: true
    AgreementResponse:
      type: object
      properties:
        year:
          type: integer
        target:
          type: string
        acquirer:
          type: string
        filing_date:
          type: string
          nullable: true
        prob_filing:
          type: number
          nullable: true
        filing_company_name:
          type: string
          nullable: true
        filing_company_cik:
          type: string
          nullable: true
        form_type:
          type: string
          nullable: true
        exhibit_type:
          type: string
          nullable: true
        transaction_price_total:
          type: number
          nullable: true
