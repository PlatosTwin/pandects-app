servers:
- url: https://api.pandects.org
  description: Production API
- url: http://localhost:5113
  description: Local development API
paths:
  /v1/search:
    get:
      parameters:
      - in: query
        name: year
        description: Agreement year filter. Repeat query key for multiple values.
        schema:
          type: array
          default: []
          example:
          - 2022
          - 2023
          items:
            type: integer
        required: false
        explode: true
        style: form
      - in: query
        name: target
        description: Exact target company names to include.
        schema:
          type: array
          default: []
          example:
          - Slack Technologies, Inc.
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: acquirer
        description: Exact acquirer company names to include.
        schema:
          type: array
          default: []
          example:
          - salesforce.com, inc.
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: standardId
        description: Clause type taxonomy standard IDs (Clause Type in the Search
          UI). Parent IDs expand to include descendant taxonomy nodes.
        schema:
          type: array
          default: []
          example:
          - '1.1'
          - 1.2.3
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transactionPriceTotal
        description: 'Pending: currently deactivated in the Search UI. Accepted but
          currently ignored by the query engine.'
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transactionPriceStock
        description: 'Pending: currently deactivated in the Search UI. Accepted but
          currently ignored by the query engine.'
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transactionPriceCash
        description: 'Pending: currently deactivated in the Search UI. Accepted but
          currently ignored by the query engine.'
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transactionPriceAssets
        description: 'Pending: currently deactivated in the Search UI. Accepted but
          currently ignored by the query engine.'
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transactionConsideration
        description: 'Pending: currently deactivated in the Search UI. Transaction
          consideration category values from the agreement record.'
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: targetType
        description: 'Pending: currently deactivated in the Search UI. Target company
          type values (for example `public` or `private`).'
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: acquirerType
        description: 'Pending: currently deactivated in the Search UI. Acquirer company
          type values (for example `public` or `private`).'
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: targetIndustry
        description: 'Pending: currently deactivated in the Search UI. Target industry
          values from normalized agreement metadata.'
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: acquirerIndustry
        description: 'Pending: currently deactivated in the Search UI. Acquirer industry
          values from normalized agreement metadata.'
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: dealStatus
        description: 'Pending: currently deactivated in the Search UI. Deal status
          values (for example `pending`, `complete`, `cancelled`).'
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: attitude
        description: 'Pending: currently deactivated in the Search UI. Deal attitude
          values (for example `friendly`, `hostile`, `unsolicited`).'
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: dealType
        description: Deal type values from agreement metadata.
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: purpose
        description: 'Pending: currently deactivated in the Search UI. Strategic purpose
          values from agreement metadata.'
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: targetPe
        description: 'Pending: currently deactivated in the Search UI. Target private-equity
          backed filter. Supported values: `true`, `false`.'
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: acquirerPe
        description: 'Pending: currently deactivated in the Search UI. Acquirer private-equity
          backed filter. Supported values: `true`, `false`.'
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: agreementUuid
        description: Filter to one agreement UUID.
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: sectionUuid
        description: Filter to one section UUID.
        schema:
          type: string
          default: null
          nullable: true
        required: false
      - in: query
        name: sortBy
        description: 'Sort key. One of: `year`, `target`, `acquirer`.'
        schema:
          type: string
          default: year
        required: false
      - in: query
        name: sortDirection
        description: 'Sort direction. One of: `asc`, `desc`.'
        schema:
          type: string
          default: desc
        required: false
      - in: query
        name: page
        description: 1-based page number.
        schema:
          type: integer
          default: 1
          example: 1
        required: false
      - in: query
        name: pageSize
        description: Page size. Effective max is 10 for unauthenticated callers and
          100 for authenticated callers.
        schema:
          type: integer
          default: 25
          example: 25
        required: false
      responses:
        '422':
          $ref: '#/components/responses/UNPROCESSABLE_ENTITY'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
      - search
      operationId: searchSections
      summary: Search agreement sections
      description: Searches sections using structured filters and taxonomy IDs. For
        list filters, repeat query keys (for example `year=2023&year=2024`).
  /v1/dumps:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DumpEntry'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
      - dumps
      operationId: listDumps
      summary: List available bulk dumps
      description: Returns newest-first metadata for publicly available database dump
        artifacts.
  /v1/taxonomy:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  required:
                  - id
                  properties:
                    id:
                      type: string
                    children:
                      type: object
                      additionalProperties:
                        type: object
      tags:
      - taxonomy
      operationId: getTaxonomy
      summary: Retrieve clause taxonomy
      description: Returns the hierarchical Pandects taxonomy tree keyed by standard
        ID.
  /v1/agreements/{agreement_uuid}:
    get:
      parameters:
      - in: path
        name: agreement_uuid
        required: true
        schema:
          type: string
          minLength: 1
        description: Agreement UUID.
        example: 0279944d-85ca-5707-908a-d4cbd169d058
      responses:
        '422':
          $ref: '#/components/responses/UNPROCESSABLE_ENTITY'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgreementResponse'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
      - agreements
      operationId: getAgreement
      summary: Retrieve agreement text by UUID
      description: Returns agreement metadata and XML content. For anonymous callers,
        XML can be redacted based on `focusSectionUuid` and `neighborSections`.
    parameters:
    - in: path
      name: agreement_uuid
      required: true
      schema:
        type: string
        minLength: 1
  /v1/sections/{section_uuid}:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SectionResponse'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
      - sections
      operationId: getSection
      summary: Retrieve section text by UUID
      description: Returns one section payload including taxonomy IDs and XML content.
      parameters:
      - in: path
        name: section_uuid
        required: true
        schema:
          type: string
          minLength: 1
        description: Section UUID.
        example: 0006660d-c622-5fbf-a9b9-c220335f0197
    parameters:
    - in: path
      name: section_uuid
      required: true
      schema:
        type: string
        minLength: 1
info:
  title: Pandects API
  version: v1
tags:
- name: search
  description: Search merger agreement sections
- name: dumps
  description: Access metadata about bulk data on Cloudflare
- name: taxonomy
  description: Access the Pandects agreement taxonomy
- name: agreements
  description: Retrieve full text for a given agreement
- name: sections
  description: Retrieve full text for a given section
openapi: 3.0.2
components:
  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
          description: Error code
        status:
          type: string
          description: Error name
        message:
          type: string
          description: Error message
        errors:
          type: object
          description: Errors
          additionalProperties: {}
    PaginationMetadata:
      type: object
      properties:
        total:
          type: integer
        total_pages:
          type: integer
        first_page:
          type: integer
        last_page:
          type: integer
        page:
          type: integer
        previous_page:
          type: integer
        next_page:
          type: integer
    SectionItem:
      type: object
      properties:
        id:
          type: string
          description: Canonical identifier for this section result.
        agreementUuid:
          type: string
          description: Agreement UUID for the section.
        sectionUuid:
          type: string
          description: Section UUID.
        standardId:
          type: array
          description: Matched taxonomy standard IDs for this section.
          items:
            type: string
        xml:
          type: string
          description: Section XML content. Full content requires authentication.
        articleTitle:
          type: string
          description: Article heading that contains the section.
        sectionTitle:
          type: string
          description: Section heading text.
        acquirer:
          type: string
          description: Acquirer company name.
        target:
          type: string
          description: Target company name.
        year:
          type: integer
          description: Agreement year.
        verified:
          type: boolean
          description: Whether this result is from verified content.
    AccessInfo:
      type: object
      properties:
        tier:
          type: string
          description: Access tier used to shape response limits and content visibility.
        message:
          type: string
          description: Optional human-readable access message for the caller.
          nullable: true
      required:
      - tier
    SearchResponse:
      type: object
      properties:
        results:
          type: array
          description: Page of search results.
          items:
            $ref: '#/components/schemas/SectionItem'
        access:
          description: Access context applied to this response.
          allOf:
          - $ref: '#/components/schemas/AccessInfo'
        page:
          type: integer
          description: Current 1-based page number.
        pageSize:
          type: integer
          description: Effective page size for this response.
        totalCount:
          type: integer
          description: Total number of matching sections.
        totalPages:
          type: integer
          description: Total pages at the effective page size.
        hasNext:
          type: boolean
          description: Whether a next page exists.
        hasPrev:
          type: boolean
          description: Whether a previous page exists.
        nextNum:
          type: integer
          description: Next page number when `hasNext` is true.
          nullable: true
        prevNum:
          type: integer
          description: Previous page number when `hasPrev` is true.
          nullable: true
    DumpEntry:
      type: object
      properties:
        timestamp:
          type: string
          description: Dump timestamp label (derived from object prefix).
        sql:
          type: string
          format: url
          description: Public URL for the compressed SQL dump file.
          nullable: true
        sha256:
          type: string
          description: SHA-256 digest value for the dump when available.
          nullable: true
        sha256_url:
          type: string
          format: url
          description: Public URL to a `.sha256` checksum file.
          nullable: true
        manifest:
          type: string
          format: url
          description: Public URL to a manifest JSON file for the dump.
          nullable: true
        size_bytes:
          type: integer
          description: Dump file size in bytes when available.
          nullable: true
        warning:
          type: string
          description: Warning message when metadata is incomplete.
          nullable: true
      required:
      - timestamp
    AgreementResponse:
      type: object
      properties:
        year:
          type: integer
          description: Agreement year.
        target:
          type: string
          description: Target company name.
        acquirer:
          type: string
          description: Acquirer company name.
        filing_date:
          type: string
          description: SEC filing date, when available.
          nullable: true
        prob_filing:
          type: number
          description: Model confidence score for filing linkage.
          nullable: true
        filing_company_name:
          type: string
          description: Filing entity name in SEC metadata.
          nullable: true
        filing_company_cik:
          type: string
          description: Filing entity CIK in SEC metadata.
          nullable: true
        form_type:
          type: string
          description: SEC form type.
          nullable: true
        exhibit_type:
          type: string
          description: SEC exhibit type.
          nullable: true
        transaction_price_total:
          type: number
          description: Total transaction value when available.
          nullable: true
        transaction_price_stock:
          type: number
          description: Stock portion of transaction consideration.
          nullable: true
        transaction_price_cash:
          type: number
          description: Cash portion of transaction consideration.
          nullable: true
        transaction_price_assets:
          type: number
          description: Asset portion of transaction consideration.
          nullable: true
        transaction_consideration:
          type: string
          description: High-level consideration type classification.
          nullable: true
        target_type:
          type: string
          description: Target company type.
          nullable: true
        acquirer_type:
          type: string
          description: Acquirer company type.
          nullable: true
        target_industry:
          type: string
          description: Target industry classification.
          nullable: true
        acquirer_industry:
          type: string
          description: Acquirer industry classification.
          nullable: true
        announce_date:
          type: string
          description: Public deal announcement date.
          nullable: true
        close_date:
          type: string
          description: Deal close date, when available.
          nullable: true
        deal_status:
          type: string
          description: Current status of the deal.
          nullable: true
        attitude:
          type: string
          description: Deal attitude classification.
          nullable: true
        deal_type:
          type: string
          description: Deal type classification.
          nullable: true
        purpose:
          type: string
          description: Deal purpose classification.
          nullable: true
        target_pe:
          type: boolean
          description: Whether target is private-equity backed.
          nullable: true
        acquirer_pe:
          type: boolean
          description: Whether acquirer is private-equity backed.
          nullable: true
        url:
          type: string
          description: Source filing URL.
        xml:
          type: string
          description: Agreement XML content (may be redacted for anonymous access).
        isRedacted:
          type: boolean
          description: Present and true when XML has been redacted for access control.
    SectionResponse:
      type: object
      properties:
        agreementUuid:
          type: string
          description: Agreement UUID that owns this section.
        sectionUuid:
          type: string
          description: Section UUID.
        sectionStandardId:
          type: array
          description: Taxonomy standard IDs for this section.
          items:
            type: string
        xml:
          type: string
          description: Section XML content.
        articleTitle:
          type: string
          description: Parent article heading.
        sectionTitle:
          type: string
          description: Section heading text.
  responses:
    UNPROCESSABLE_ENTITY:
      description: Unprocessable Entity
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    DEFAULT_ERROR:
      description: Default error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
