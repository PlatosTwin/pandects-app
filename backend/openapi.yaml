      - in: query
        name: transaction_price_stock
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transaction_price_cash
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transaction_price_assets
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: transaction_consideration
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: target_type
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: acquirer_type
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: target_counsel
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: acquirer_counsel
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: target_industry
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: acquirer_industry
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: deal_status
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: attitude
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
        explode: true
        style: form
      - in: query
        name: deal_type
        schema:
          type: array
          default: []
          items:
            type: string
        required: false
