name: Deploy Backend

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'

# Queue deploys instead of overlapping them; never cancel a running
# flyctl deploy mid-flight.
concurrency:
  group: deploy-backend
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  quality:
    uses: ./.github/workflows/backend-quality.yml

  deploy:
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Backend
        run: flyctl deploy --remote-only --wait-timeout 600 --config backend/fly.toml --dockerfile backend/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
