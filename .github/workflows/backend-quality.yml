name: Backend Quality

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-quality.yml"
  push:
    branches: [ main ]
    paths:
      - "backend/**"
      - ".github/workflows/backend-quality.yml"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      SKIP_MAIN_DB_REFLECTION: "1"
      MCP_ENABLE_LIVE_TRANSPORT_TESTS: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install backend dependencies
        run: |
          python -m venv backend/venv
          backend/venv/bin/python -m pip install --upgrade pip
          backend/venv/bin/python -m pip install -r backend/requirements.txt

      - name: Run basedpyright
        run: |
          backend/venv/bin/python -m basedpyright --outputjson -p backend/pyrightconfig.json > /tmp/basedpyright.json || true
          backend/venv/bin/python - <<'PY'
          import json
          import sys

          with open("/tmp/basedpyright.json", "r", encoding="utf-8") as f:
              report = json.load(f)

          errors = [
              diag for diag in report.get("generalDiagnostics", [])
              if diag.get("severity") == "error"
          ]
          if errors:
              for diag in errors[:50]:
                  file = diag.get("file", "<unknown>")
                  message = diag.get("message", "")
                  rule = diag.get("rule", "")
                  print(f"{file}: {message} {f'[{rule}]' if rule else ''}".rstrip())
              print(f"basedpyright found {len(errors)} error diagnostics.")
              sys.exit(1)

          summary = report.get("summary", {})
          print(
              f"basedpyright passed with {summary.get('errorCount', 0)} errors and "
              f"{summary.get('warningCount', 0)} warnings."
          )
          PY

      - name: Run backend unit tests
        run: backend/venv/bin/python -m unittest discover backend/tests -v

      - name: Run MCP transport workflow tests
        run: backend/venv/bin/python -m unittest backend.tests.test_mcp.McpTests.test_live_http_transport_client_compatibility_flow backend.tests.test_mcp.McpTests.test_live_http_transport_filter_to_retrieval_workflow backend.tests.test_mcp.McpTests.test_live_http_transport_redaction_and_fulltext_workflow -v
