name: Deploy Frontend

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'

# Queue deploys instead of overlapping them; never cancel a running
# flyctl deploy mid-flight.
concurrency:
  group: deploy-frontend
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  quality:
    uses: ./.github/workflows/frontend-quality.yml

  deploy:
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # v1.6

      - name: Deploy Frontend
        run: flyctl deploy --remote-only --config frontend/fly.toml --dockerfile frontend/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
