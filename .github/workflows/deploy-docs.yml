name: Deploy Docs

on:
  # Manual trigger for redeploys/rollbacks without a source change.
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "docs/**"
      - "branding/**"
      - "frontend/public/openapi.yaml"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # v1.6

      - name: Deploy Docs
        run: flyctl deploy --remote-only --config docs/fly.toml --dockerfile docs/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
