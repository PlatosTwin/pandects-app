server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    application/javascript
    application/json
    application/manifest+json
    application/xml
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  location = / {
    add_header Cache-Control "public, max-age=60, stale-while-revalidate=300";
    try_files /prerender/index.html /index.html;
  }

  location = /about { try_files /prerender/about.html /index.html; }
  location = /agreement-index { try_files /prerender/agreement-index.html /index.html; }
  location = /bulk-data { try_files /prerender/bulk-data.html /index.html; }
  location = /leaderboards { try_files /prerender/leaderboards.html /index.html; }
  location = /license { try_files /prerender/license.html /index.html; }
  location = /license/data { try_files /prerender/license-data.html /index.html; }
  location = /license/software { try_files /prerender/license-software.html /index.html; }
  location = /privacy-policy { try_files /prerender/privacy-policy.html /index.html; }
  location = /search { try_files /prerender/search.html /index.html; }
  location = /sources-methods { try_files /prerender/sources-methods.html /index.html; }
  location = /taxonomy { try_files /prerender/taxonomy.html /index.html; }
  location = /terms { try_files /prerender/terms.html /index.html; }
  location = /trends-analyses { try_files /prerender/trends-analyses.html /index.html; }
  location = /xml-schema { try_files /prerender/xml-schema.html /index.html; }

  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
}
