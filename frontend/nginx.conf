server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers. Must mirror frontend/server/security-headers.ts and
  # netlify.toml; scripts/validate-csp.mjs fails the build if they drift.
  # Variables can't appear in `add_header` directives directly across all
  # nginx versions, so the policy is inlined per-block.
  set $csp_policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'sha256-+U2pgnR7KzUPdPm7txOcOU/ybpYQg1zIb0Eulu5WYfo=' 'sha256-4Kbq0scP4JF6MS1yuGonVFPfWGdfFNqm1WbA5cSJBAY=' 'sha256-86dhVQgcPzhOLyX/PmFIsdaYvyl49EiQBKsxSBEMSAM=' 'sha256-CEk3PP6Osq9RVsVcu3ubGqHavTuG6tC+b++DjpUvm6U=' 'sha256-KeMoasuDNAoc4IRPqzh9738fSp278T0rEyvdku+WE6E=' 'sha256-LMMBf6zOTXrlQbyRSOUseWFeKiJBpVcjNg69fYslMvA=' 'sha256-MZTf9y39rMH0LnA9Cbm7xSJvJUPvgjqO8pQgnLa5l28=' 'sha256-Pt80vkoc2WC/qmxlVJYydq1oCRYzmjxAVFtn5hElaeg=' 'sha256-ZYSGZRqdmoD6IjY3oZ+ajAxJRBotNJjdfhfvgtQ/620=' 'sha256-b0JjQeB1d9d/VJz83FV2ggXIgDtAQYcRde2B852Ft1c=' 'sha256-dgm4kLGTEn6wl6RAGvlpziHwIhxU0EFm9KeoypQ4adM=' 'sha256-f4jmDx8WgTaqNsQk9o4y8pv6mrtvaZNKZ6zhgpimP4o=' 'sha256-h9Wt0ttVhHf+Fnz2tVjMdBdfXlJnN/hhUZPazTO3QeM=' 'sha256-hd3Mi3gceHC39K8yFGsayGDuDiTgbWes2W0ZlAJub6k=' 'sha256-iwCQ7bLVZXmMjtp//wE+dfYltHcPxjm5IEfa/nTRFjk=' 'sha256-mB1FCbOcQcb0HtVz7IZ3X8WUabcx4NVzfwarJXHmaBQ=' 'sha256-pmMCya+ZSRMqQbEiyFoeJOh6yCGWKATIkYQ0iXDfkFk=' 'sha256-wpCEcfeCbnBv1KfAFjgHETo2RPHVmH3Z7kG5eFAheKo=' 'sha256-yxM2FIuC4NNDxdEhv8xND9lccfFhcTud3h5sAb/R+fc=' https://www.googletagmanager.com https://static.airtable.com https://accounts.google.com https://challenges.cloudflare.com; connect-src 'self' https://api.pandects.org https://www.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://challenges.cloudflare.com; img-src 'self' data: https://www.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; frame-src 'self' https://airtable.com https://accounts.google.com https://challenges.cloudflare.com; form-action 'self'; upgrade-insecure-requests";

  add_header Content-Security-Policy $csp_policy always;
  add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=(), interest-cohort=()" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    application/javascript
    application/json
    application/manifest+json
    application/xml
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  location = / {
    add_header Content-Security-Policy $csp_policy always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=(), interest-cohort=()" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Cache-Control "public, max-age=60, stale-while-revalidate=300" always;
    try_files /prerender/index.html /index.html;
  }

  location = /about { try_files /prerender/about.html /index.html; }
  location = /agreement-index { try_files /prerender/agreement-index.html /index.html; }
  location = /bulk-data { try_files /prerender/bulk-data.html /index.html; }
  location = /leaderboards { try_files /prerender/leaderboards.html /index.html; }
  location = /license { try_files /prerender/license.html /index.html; }
  location = /license/data { try_files /prerender/license-data.html /index.html; }
  location = /license/software { try_files /prerender/license-software.html /index.html; }
  location = /privacy-policy { try_files /prerender/privacy-policy.html /index.html; }
  location = /search { try_files /prerender/search.html /index.html; }
  location = /sources-methods { try_files /prerender/sources-methods.html /index.html; }
  location = /taxonomy { try_files /prerender/taxonomy.html /index.html; }
  location = /terms { try_files /prerender/terms.html /index.html; }
  location = /trends-analyses { try_files /prerender/trends-analyses.html /index.html; }
  location = /xml-schema { try_files /prerender/xml-schema.html /index.html; }

  location / {
    add_header Content-Security-Policy $csp_policy always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=(), interest-cohort=()" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Cache-Control "no-cache" always;
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    expires 1y;
    add_header Content-Security-Policy $csp_policy always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=(), interest-cohort=()" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }
}
