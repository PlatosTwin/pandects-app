[build]
  command = "npm run build:client"
  functions = "netlify/functions"
  publish = "dist/spa"

[functions]
  external_node_modules = ["express"]
  node_bundler = "esbuild"

# Security headers. Must mirror frontend/server/security-headers.ts and
# nginx.conf; scripts/validate-csp.mjs fails the build if they drift.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'sha256-+U2pgnR7KzUPdPm7txOcOU/ybpYQg1zIb0Eulu5WYfo=' 'sha256-4Kbq0scP4JF6MS1yuGonVFPfWGdfFNqm1WbA5cSJBAY=' 'sha256-86dhVQgcPzhOLyX/PmFIsdaYvyl49EiQBKsxSBEMSAM=' 'sha256-CEk3PP6Osq9RVsVcu3ubGqHavTuG6tC+b++DjpUvm6U=' 'sha256-KeMoasuDNAoc4IRPqzh9738fSp278T0rEyvdku+WE6E=' 'sha256-LMMBf6zOTXrlQbyRSOUseWFeKiJBpVcjNg69fYslMvA=' 'sha256-MZTf9y39rMH0LnA9Cbm7xSJvJUPvgjqO8pQgnLa5l28=' 'sha256-Pt80vkoc2WC/qmxlVJYydq1oCRYzmjxAVFtn5hElaeg=' 'sha256-ZYSGZRqdmoD6IjY3oZ+ajAxJRBotNJjdfhfvgtQ/620=' 'sha256-b0JjQeB1d9d/VJz83FV2ggXIgDtAQYcRde2B852Ft1c=' 'sha256-dgm4kLGTEn6wl6RAGvlpziHwIhxU0EFm9KeoypQ4adM=' 'sha256-f4jmDx8WgTaqNsQk9o4y8pv6mrtvaZNKZ6zhgpimP4o=' 'sha256-h9Wt0ttVhHf+Fnz2tVjMdBdfXlJnN/hhUZPazTO3QeM=' 'sha256-hd3Mi3gceHC39K8yFGsayGDuDiTgbWes2W0ZlAJub6k=' 'sha256-iwCQ7bLVZXmMjtp//wE+dfYltHcPxjm5IEfa/nTRFjk=' 'sha256-mB1FCbOcQcb0HtVz7IZ3X8WUabcx4NVzfwarJXHmaBQ=' 'sha256-pmMCya+ZSRMqQbEiyFoeJOh6yCGWKATIkYQ0iXDfkFk=' 'sha256-wpCEcfeCbnBv1KfAFjgHETo2RPHVmH3Z7kG5eFAheKo=' 'sha256-yxM2FIuC4NNDxdEhv8xND9lccfFhcTud3h5sAb/R+fc=' https://www.googletagmanager.com https://static.airtable.com https://accounts.google.com https://challenges.cloudflare.com; connect-src 'self' https://api.pandects.org https://www.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://challenges.cloudflare.com; img-src 'self' data: https://www.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; frame-src 'self' https://airtable.com https://accounts.google.com https://challenges.cloudflare.com; form-action 'self'; upgrade-insecure-requests"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Resource-Policy = "same-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=(), interest-cohort=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=15552000; includeSubDomains"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
  
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

