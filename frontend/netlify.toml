[build]
  command = "npm run build:client"
  functions = "netlify/functions"
  publish = "dist/spa"

[functions]
  external_node_modules = ["express"]
  node_bundler = "esbuild"
  
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/about"
  to = "/prerender/about.html"
  status = 200

[[redirects]]
  from = "/agreement-index"
  to = "/prerender/agreement-index.html"
  status = 200

