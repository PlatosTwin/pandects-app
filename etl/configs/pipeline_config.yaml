resources:
  pipeline_config:
    config:
      pre_processing_mode: from_scratch
      queue_run_mode: single_batch
      refresh: true
      resume_openai_batches: true
      tagging_agreement_batch_size: 10
      pre_processing_agreement_batch_size: 10
      xml_agreement_batch_size: 10
      ai_repair_page_budget: 400
      ai_repair_attempt_priority: not_attempted_first
      taxonomy_agreement_batch_size: 10
      taxonomy_mode: llm
      taxonomy_section_title_regex: null
      taxonomy_llm_model: gpt-5-mini
      taxonomy_llm_sections_per_request: 5
      tx_metadata_agreement_batch_size: 10
      tx_metadata_mode: offline
      embed_agreement_batch_size: 10
      embed_focus_section: ""
      embed_focus_section_batch_size: 100
      embed_target: section
      staging_days_to_fetch: 7
      staging_rate_limit_max_requests: 10
      staging_rate_limit_window_seconds: 1.025
      staging_max_workers: 8
      staging_use_keyword_filter: true
